name: KRX Backfill (1 Year)
on:
  workflow_dispatch:
    inputs:
      days:
        description: '백필 일수 (기본 250)'
        required: false
        default: '250'
      start_from:
        description: '시작 인덱스 (재시작용, 기본 0)'
        required: false
        default: '0'
permissions:
  contents: read
jobs:
  krx-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r scripts/requirements_actions.txt
      - name: Run KRX backfill
        env:
          BOT_URL: ${{ secrets.BOT_URL }}
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
        run: python scripts/krx_backfill.py --days ${{ github.event.inputs.days }} --start-from ${{ github.event.inputs.start_from }}
