name: KRX Daily Update
on:
  schedule:
    # UTC 07:10 = KST 16:10 (맥미니 시세 수집 15:55 후 15분 여유)
    - cron: '10 7 * * 1-5'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  krx-supplement:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r scripts/requirements_actions.txt
      - name: Run KRX supplement (수급/공매도/외인보유)
        env:
          BOT_URL: ${{ secrets.BOT_URL }}
          BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
        run: python scripts/krx_update.py --supplement
