● name: KRX Daily Update

  on:
    schedule:
      # UTC 06:55 = KST 15:55, 평일만 (Mon-Fri)
      - cron: '55 6 * * 1-5'
    workflow_dispatch:

  permissions:
    contents: read

  jobs:
    krx-update:
      runs-on: ubuntu-latest
      timeout-minutes: 10
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python 3.11
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: pip install -r scripts/requirements_actions.txt

        - name: Run KRX crawler
          env:
            BOT_URL: ${{ secrets.BOT_URL }}
            BOT_API_KEY: ${{ secrets.BOT_API_KEY }}
          run: python scripts/krx_update.py
