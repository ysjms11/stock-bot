[pytest]
# pytest-asyncio: async def 테스트를 자동으로 asyncio 이벤트 루프에서 실행
# (테스트들이 @pytest.mark.asyncio 마커를 쓰지만 auto 모드로 마커 누락 케이스까지 커버)
asyncio_mode = auto

# 마커 등록 (root + tests/ 공통). live = 실 네트워크/DB/프로덕션 데이터 의존 통합 테스트.
# conftest.py 가 --run-live 없으면 live 마커 테스트를 자동 skip.
markers =
    live: 실제 네트워크/DB/프로덕션 데이터를 치는 통합 테스트 (기본 skip, --run-live 로 실행)
    asyncio: pytest-asyncio 코루틴 테스트 마커
